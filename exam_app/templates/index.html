<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>在线考试系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1 class="mb-4">📝 欢迎，{{ candidate_name }}</h1>
    <p>本试卷共20题：单选题10道、多选题8道、简答题2道。满分100分，考试时间30分钟。</p>
    <p class="text-danger"><strong>注意：</strong>考试中途不可退出或刷新页面，否则将自动交卷。每人仅有一次考试机会。</p>
    <form method="post" action="/start">
        <button type="submit" class="btn btn-primary btn-lg">开始考试</button>
    </form>
    <hr>
    <a href="/logout" class="btn btn-outline-secondary">退出登录</a>
</body>
</html>
